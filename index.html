<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>DIY Maker AI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- 左侧栏 -->
  <aside class="sidebar">
    <div class="logo">🧩 DIY Maker AI</div>

    <button class="menu active">拼豆模式</button>
    <button class="menu">十字绣模式</button>
    <button class="menu">乐高模式</button>
    <button class="menu">像素画</button>

    <div class="upload-box">
      <input type="file" id="upload">
      <label>📤 上传图片</label>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">

    <h1>AI 图片优化 & 可制作性分析</h1>

    <div class="content">

      <!-- 原图 -->
      <div class="card">
        <h3>原始图片</h3>
        <img id="origin" />
      </div>

      <!-- 结果 -->
      <div class="card">
        <h3>AI 优化结果</h3>
        <canvas id="canvas"></canvas>
      </div>

      <!-- 分析 -->
      <div class="panel">

        <div class="score">
          <div id="rate">0%</div>
          <p>成功率</p>
        </div>

        <div class="tips" id="tips"></div>

        <button onclick="optimize()">重新优化</button>

      </div>

    </div>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
