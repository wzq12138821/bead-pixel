<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>DIY Maker AI v3</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <aside class="sidebar">
    <div class="logo">🧩 DIY Maker AI</div>

    <button class="menu active">拼豆分析</button>
    <button class="menu">成功率模型</button>
    <button class="menu">AI优化</button>

    <div class="upload-box">
      <input type="file" id="upload">
      <label>📤 上传图片</label>
    </div>

    <button onclick="generatePDF()">📄 导出制作PDF</button>
  </aside>

  <main class="main">

    <h1>AI DIY 可制作性分析系统</h1>

    <div class="content">

      <div class="card">
        <h3>原图</h3>
        <img id="origin">
      </div>

      <div class="card">
        <h3>AI优化结果</h3>
        <canvas id="canvas"></canvas>
      </div>

      <div class="panel">

        <div class="score">
          <div id="rate">0%</div>
          <p>成功率</p>
        </div>

        <div id="tips"></div>

      </div>

    </div>

  </main>

</div>

<script src="app.js"></script>

</body>
</html>
